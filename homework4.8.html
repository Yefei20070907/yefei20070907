<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadratic Equation Solver</title>
</head>
<body>
    <script>
        // 封装求解函数
        function solveQuadratic(a, b, c) {
            if (a === 0) {
                return "a不能为0，这不是一元二次方程";
            }
            const delta = b * b - 4 * a * c;
            if (delta > 0) {
                const x1 = (-b + Math.sqrt(delta)) / (2 * a);
                const x2 = (-b - Math.sqrt(delta)) / (2 * a);
                return `方程有两个不相等的实数根：x1 =${x1.toFixed(2)}, x2 =${x2.toFixed(2)}`;
            } else if (delta === 0) {
                const x = (-b) / (2 * a);
                return `方程有两个相等的实数根：x =${x.toFixed(2)}`;
            } else {
                const realPart = (-b) / (2 * a);
                const imaginaryPart = Math.sqrt(-delta) / (2 * a);
                return `方程没有实数根，有两个共轭虚数根：x1 =${realPart.toFixed(2)} +${imaginaryPart.toFixed(2)}i, x2 =${realPart.toFixed(2)} -${imaginaryPart.toFixed(2)}i`;
            }
        }

        // 三次输入并求解
        for (let i = 0; i < 3; i++) {
            const a = parseFloat(prompt(`第${i+1}次输入，请输入系数a:`));
            const b = parseFloat(prompt(`第${i+1}次输入，请输入系数b:`));
            const c = parseFloat(prompt(`第${i+1}次输入，请输入系数c:`));
            
            const result = solveQuadratic(a, b, c);
            console.log(result);
            alert(result);
        }
    </script>
</body>
</html>
