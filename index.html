<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>清明上河图滚动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .scroll-box {
            width: 100vw;
            height: 60vh;
            overflow: hidden;
            border: 5px solid #8b4513;
            margin: 50px auto;
            position: relative;
        }
        .scroll-img {
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            animation: scroll 60s linear infinite;
        }
        @keyframes scroll {
            0% { left: 0; }
            100% { left: -2000px; }
        }
    </style>
</head>
