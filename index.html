<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>千里江山图滚动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 去掉 flex 居中，让盒子占满宽度 */
        body {
            min-height: 100vh;
            background-color: #f0f0f0;
            padding: 50px 0; /* 只保留上下间距，去掉左右留白 */
        }
        .scroll-box {
            width: 100vw; /* 占满屏幕宽度 */
            height: 60vh;
            overflow: hidden;
            border: 5px solid #8b4513;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .scroll-img {
            width: 100%; /* 让图片水平铺满盒子，不再只限制高度 */
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            animation: scroll 80s linear infinite;
        }
        @keyframes scroll {
            0% { left: 0; }
            100% { left: -100%; } /* 用百分比滚动，适配任意图片宽度 */
        }
    </style>
</head>
<body>
    <div class="scroll-box">
        <img src="千里江山图.png" class="scroll-img" alt="千里江山图">
    </div>
</body>
</html>
